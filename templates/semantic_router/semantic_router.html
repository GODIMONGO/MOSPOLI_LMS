<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://e.mospolytech.ru/icon.png" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='semantic_router/semantic_router.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='normalize.css') }}">
    <title>СДО - Semantic Router</title>
</head>
<body>
    <header>
        <img class="logo-4d9aa449" src="https://e.mospolytech.ru/assets/logo-4d9aa449.png" alt="Московский Политех">
        <a class="back-button" href="{{ url_for('dashboard') }}">Назад</a>
    </header>
    <main class="semantic-router-page">
        <section class="semantic-router-panel" data-semantic-router>
            <h1>Семантическая навигация</h1>
            <form class="semantic-router-form" data-semantic-router-form>
                <label for="semantic-router-query">Запрос</label>
                <div class="semantic-router-row">
                    <input id="semantic-router-query" name="query" type="search" autocomplete="off" placeholder="Например: как загрузить файл?" data-semantic-router-input>
                    <button type="submit">Найти</button>
                </div>
            </form>
            <div class="semantic-router-status" data-semantic-router-status></div>
            <div class="semantic-router-options" data-semantic-router-options></div>
        </section>
    </main>
    <script src="{{ url_for('static', filename='semantic_router/semantic_router.js') }}"></script>
</body>
</html>
