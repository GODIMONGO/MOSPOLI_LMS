<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Видео плеер</title>
    <style>
        :root{
            --bg:#0f1724; --accent:#1e90ff;
        }
        html,body{height:100%;margin:0;background:var(--bg);font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;}
        .video-container{position:relative;background:#000;}
        video{display:block;width:100%;height:auto;background:#000;}
        .progress{display:flex;align-items:center;padding:10px;background:rgba(0,0,0,0.6);}
        input[type="range"]{appearance:none;width:100%;height:6px;border-radius:6px;background:rgba(255,255,255,0.06);outline:none}
        input[type="range"]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);}
        .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);background:rgba(0,0,0,0.6);border:none;color:#fff;padding:10px 20px;border-radius:5px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" preload="metadata" src="../../static/ui-ui-a/video/ui-ui-a.mp4" crossorigin="anonymous">
            Ваш браузер не поддерживает видео.
        </video>
        <button id="playBtn" class="play-btn">Воспроизвести</button>
        <div class="progress">
            <input id="seek" type="range" min="0" max="100" value="0" step="0.1">
        </div>
    </div>
    <script>
        const video = document.getElementById('video');
        const seek = document.getElementById('seek');
        const playBtn = document.getElementById('playBtn');

        function formatTime(s){
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60).toString().padStart(2,'0');
            return `${m}:${sec}`;
        }

        video.addEventListener('loadedmetadata', ()=>{
            seek.max = video.duration;
        });
        video.addEventListener('timeupdate', ()=>{
            seek.value = video.currentTime;
        });
        seek.addEventListener('change', ()=>{
            video.currentTime = seek.value;
        });

        playBtn.addEventListener('click', ()=>{
            if(video.paused){
                video.play();
                playBtn.textContent = 'Пауза';
            } else {
                video.pause();
                playBtn.textContent = 'Воспроизвести';
            }
        });
    </script>
</body>
</html>
