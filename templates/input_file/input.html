<!-- http://127.0.0.1:5000/input_file -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Bootstrap Fileinput CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.5.4/css/fileinput.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='input_file/input_file.css') }}">
    
    <style>
        .file-zoom-actions .kv-file-rotate,
        .file-zoom-actions .kv-file-upload {
            display: none !important;
        }
        
        .kv-file-remove {
            display: inline-block !important;
        }
    </style>
</head>
<body>
    <section class="input-section">
        <form method="post" enctype="multipart/form-data">
            <div class="form-input-file">
                <h3>{{ text_input }}</h3>
                <input type="file" id="file" name="file" multiple>
            </div>
            <div class="form-button">
                <button type="submit" class="btn btn-primary">Отправить</button>
            </div>
            <div class="status">
                <p class="text-success">Статус отправки файлов: {{ status }}</p>
            </div>
        </form>
    </section>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Popper.js (required for bootstrap-fileinput) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    
    <!-- Bootstrap Fileinput JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.5.4/js/fileinput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.5.4/js/locales/ru.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-fileinput@5.5.4/themes/bs5/theme.min.js"></script>
    
    <script>
        $("#file").fileinput({
            language: 'ru',
            theme: 'bs5',
            uploadUrl: '#',
            allowedFileExtensions: ['jpg', 'jpeg', 'png', 'gif', 'pdf', 'doc', 'docx', 'txt'],
            showUpload: false,
            showCancel: false,
            showRemove: true,
            showClose: false,
            browseOnZoneClick: true,
            initialPreviewAsData: true,
            overwriteInitial: false,
            maxFileSize: 10240,
            maxFilesNum: 10,
            slugCallback: function (filename) {
                return filename.replace('(', '_').replace(']', '_');
            },
            fileActionSettings: {
                showRemove: true,
                showUpload: false,
                showZoom: true,
                showDrag: false,
                showRotate: false,
                removeIcon: '<i class="bi bi-trash"></i>',
                zoomIcon: '<i class="bi bi-zoom-in"></i>',
                removeClass: 'btn btn-sm btn-danger',
                zoomClass: 'btn btn-sm btn-info'
            },
            browseClass: "btn btn-primary",
            browseLabel: "Выбрать файлы",
            browseIcon: "<i class='bi bi-folder2-open'></i> ",
            removeClass: "btn btn-secondary",
            removeLabel: "Удалить все",
            removeIcon: "<i class='bi bi-trash'></i> ",
            dropZoneTitle: 'Перетащите файлы сюда или нажмите для выбора',
            msgPlaceholder: 'Выберите файлы...',
            previewFileIcon: '<i class="bi bi-file-earmark"></i>',
            allowedPreviewTypes: ['image', 'html', 'text', 'video', 'audio', 'pdf', 'object']
        });
    </script>
</body>
</html>
