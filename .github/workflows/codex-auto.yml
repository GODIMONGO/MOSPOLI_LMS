name: "Codex Auto (codex/codex-auto or @oracle)"

on:
  issues:
    types: [opened, edited, reopened, labeled]
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled]
  issue_comment:
    types: [created, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-auto-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-auto:
    if: >
      (github.event_name == 'issues' && (
        contains(github.event.issue.labels.*.name, 'codex') ||
        contains(github.event.issue.labels.*.name, 'codex-auto')
      )) ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'codex') ||
        contains(github.event.pull_request.labels.*.name, 'codex-auto')
      )) ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@oracle') ||
        contains(github.event.comment.body, '@Oracle') ||
        contains(github.event.comment.body, '@ORACLE')
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
      CODEX_CA_CERT_PEM: ${{ secrets.CODEX_CA_CERT_PEM }}
      CODEX_LB_DASHBOARD_BASE_URL: ${{ secrets.CODEX_LB_DASHBOARD_BASE_URL }}
      CODEX_LB_TOTP_SECRET: ${{ secrets.CODEX_LB_TOTP_SECRET }}
      CODEX_FIREWALL_BOOTSTRAP: ${{ secrets.CODEX_FIREWALL_BOOTSTRAP }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          if [ ! -f ".github/codex/certs/cert.pem" ] && [ -z "$CODEX_CA_CERT_PEM" ]; then
            echo "::error::Missing .github/codex/certs/cert.pem and CODEX_CA_CERT_PEM secret"
            exit 1
          fi

      - name: Ensure OPENAI_API_KEY compatibility
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            # Some Codex/OpenAI provider flows expect this env var to exist.
            # For custom backends that do not validate it, a placeholder is enough.
            echo "OPENAI_API_KEY=not-required-for-custom-backend" >> "$GITHUB_ENV"
          fi

      - name: Install custom CA certificate
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/codex-custom-ca.crt"
          if [ -n "$CODEX_CA_CERT_PEM" ]; then
            if echo "$CODEX_CA_CERT_PEM" | grep -q "BEGIN CERTIFICATE"; then
              printf '%s\n' "$CODEX_CA_CERT_PEM" > "$CERT_PATH"
            else
              echo "$CODEX_CA_CERT_PEM" | base64 -d > "$CERT_PATH"
            fi
          else
            cp .github/codex/certs/cert.pem "$CERT_PATH"
          fi
          sudo cp "$CERT_PATH" /usr/local/share/ca-certificates/codex-custom-ca.crt
          sudo update-ca-certificates
          echo "NODE_EXTRA_CA_CERTS=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        shell: bash
        run: npm install -g @openai/codex@latest

      - name: Configure Codex
        shell: bash
        run: |
          mkdir -p "$HOME/.codex"
          if [ -n "$CODEX_CONFIG_TOML" ]; then
            printf '%s\n' "$CODEX_CONFIG_TOML" > "$HOME/.codex/config.toml"
          else
            cp .github/codex/config.toml "$HOME/.codex/config.toml"
          fi
          echo "Using Codex config:"
          cat "$HOME/.codex/config.toml"
          codex --version

      - name: Bootstrap firewall allowlist for runner
        shell: bash
        run: |
          bootstrap="${CODEX_FIREWALL_BOOTSTRAP:-true}"
          bootstrap="$(echo "$bootstrap" | tr '[:upper:]' '[:lower:]')"
          if [ "$bootstrap" != "true" ] && [ "$bootstrap" != "1" ] && [ "$bootstrap" != "yes" ]; then
            echo "Firewall bootstrap disabled"
            exit 0
          fi

          BASE_URL="${CODEX_LB_DASHBOARD_BASE_URL%/}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="$(awk -F'=' '/^\s*chatgpt_base_url\s*=/{gsub(/[\"[:space:]]/, "", $2); print $2; exit}' "$HOME/.codex/config.toml")"
            BASE_URL="${BASE_URL%/}"
          fi
          if [ -z "$BASE_URL" ]; then
            echo "::error::Cannot resolve dashboard base URL (set CODEX_LB_DASHBOARD_BASE_URL or chatgpt_base_url)"
            exit 1
          fi

          runner_ip="$(curl -fsSL https://api.ipify.org)"
          if [ -z "$runner_ip" ]; then
            echo "::error::Failed to resolve runner egress IP"
            exit 1
          fi
          echo "RUNNER_EGRESS_IP=$runner_ip" >> "$GITHUB_ENV"
          echo "CODEX_LB_EFFECTIVE_BASE_URL=$BASE_URL" >> "$GITHUB_ENV"
          cookie_file="$RUNNER_TEMP/codex-dashboard.cookie"
          echo "CODEX_DASHBOARD_COOKIE_FILE=$cookie_file" >> "$GITHUB_ENV"

          curl_auth_args=()
          if [ -n "$CODEX_LB_TOTP_SECRET" ]; then
            totp_code="$(python -c 'import base64,hashlib,hmac,os,struct,time; s=os.environ["CODEX_LB_TOTP_SECRET"].strip().replace(" ","").upper(); p="="*((8-len(s)%8)%8); k=base64.b32decode(s+p, casefold=True); c=int(time.time())//30; m=struct.pack(">Q", c); d=hmac.new(k, m, hashlib.sha1).digest(); o=d[-1]&0x0F; code=(struct.unpack(">I", d[o:o+4])[0] & 0x7FFFFFFF) % 1000000; print(f"{code:06d}")')"
            verify_status="$(curl -sS -o "$RUNNER_TEMP/totp-verify.json" -w "%{http_code}" \
              -c "$cookie_file" \
              -H "Content-Type: application/json" \
              -d "{\"code\":\"$totp_code\"}" \
              "$BASE_URL/api/dashboard-auth/totp/verify")"
            if [ "$verify_status" != "200" ]; then
              echo "::error::TOTP verify failed with HTTP $verify_status"
              cat "$RUNNER_TEMP/totp-verify.json" || true
              exit 1
            fi
            curl_auth_args=(-b "$cookie_file")
          fi

          add_status="$(curl -sS -o "$RUNNER_TEMP/firewall-add.json" -w "%{http_code}" \
            "${curl_auth_args[@]}" \
            -H "Content-Type: application/json" \
            -d "{\"ipAddress\":\"$runner_ip\"}" \
            "$BASE_URL/api/firewall/ips")"

          case "$add_status" in
            200|201)
              echo "Firewall allowlist updated for $runner_ip"
              ;;
            409)
              echo "Runner IP already in allowlist: $runner_ip"
              ;;
            *)
              echo "::error::Failed to add runner IP to firewall allowlist (HTTP $add_status)"
              cat "$RUNNER_TEMP/firewall-add.json" || true
              exit 1
              ;;
          esac

      - name: Resolve target refs
        id: resolve_refs
        uses: actions/github-script@v7
        with:
          script: |
            let isPr = false;
            let prNumber = "";
            let baseRef = "";
            let headSha = "";
            let headRef = "";
            let headIsFork = false;
            const repoFull = `${context.repo.owner}/${context.repo.repo}`;

            if (context.eventName === "pull_request") {
              const pr = context.payload.pull_request;
              isPr = true;
              prNumber = String(pr.number);
              baseRef = pr.base.ref;
              headSha = pr.head.sha;
              headRef = pr.head.ref;
              headIsFork = pr.head.repo.full_name !== repoFull;
            } else if (context.eventName === "issue_comment" && context.payload.issue?.pull_request) {
              isPr = true;
              prNumber = String(context.payload.issue.number);
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              baseRef = pr.data.base.ref;
              headSha = pr.data.head.sha;
              headRef = pr.data.head.ref;
              headIsFork = pr.data.head.repo.full_name !== repoFull;
            }

            core.setOutput("is_pr", String(isPr));
            core.setOutput("pr_number", prNumber);
            core.setOutput("base_ref", baseRef);
            core.setOutput("head_sha", headSha);
            core.setOutput("head_ref", headRef);
            core.setOutput("head_is_fork", String(headIsFork));

      - name: Prepare pull request refs
        if: steps.resolve_refs.outputs.is_pr == 'true'
        shell: bash
        run: |
          git fetch --no-tags origin "${{ steps.resolve_refs.outputs.base_ref }}":"${{ steps.resolve_refs.outputs.base_ref }}"
          git fetch --no-tags origin "${{ steps.resolve_refs.outputs.head_sha }}"

      - name: Checkout pull request head commit
        if: steps.resolve_refs.outputs.is_pr == 'true'
        shell: bash
        run: |
          git checkout "${{ steps.resolve_refs.outputs.head_sha }}"

      - name: Generate diff for review
        if: steps.resolve_refs.outputs.is_pr == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ github.event.action }}" == "synchronize" ]; then
            git fetch --no-tags origin "${{ github.event.before }}" || true
            git diff "${{ github.event.before }}" "${{ github.event.after }}" > "$RUNNER_TEMP/pr-diff.txt" || echo "" > "$RUNNER_TEMP/pr-diff.txt"
          else
            git diff "${{ steps.resolve_refs.outputs.base_ref }}...${{ steps.resolve_refs.outputs.head_sha }}" > "$RUNNER_TEMP/pr-diff.txt" || echo "" > "$RUNNER_TEMP/pr-diff.txt"
          fi

      - name: Build runtime prompt
        id: build_prompt
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const eventName = context.eventName;
            const isPr = "${{ steps.resolve_refs.outputs.is_pr }}" === "true";
            const headRef = "${{ steps.resolve_refs.outputs.head_ref }}";
            const headIsFork = "${{ steps.resolve_refs.outputs.head_is_fork }}" === "true";
            const defaultBranch = context.payload.repository?.default_branch || "main";
            let payload = null;
            let templatePath = ".github/codex/prompts/issue.md";
            let triggerMode = "label:codex";
            let commentContext = "";

            if (eventName === "issues") {
              payload = context.payload.issue;
              templatePath = ".github/codex/prompts/issue.md";
              triggerMode = (payload.labels || []).some((label) => label.name === "codex-auto")
                ? "label:codex-auto"
                : "label:codex";
            } else if (eventName === "pull_request") {
              payload = context.payload.pull_request;
              templatePath = ".github/codex/prompts/pull_request.md";
              triggerMode = (payload.labels || []).some((label) => label.name === "codex-auto")
                ? "label:codex-auto"
                : "label:codex";
            } else if (eventName === "issue_comment") {
              payload = context.payload.issue;
              const isPrComment = Boolean(context.payload.issue?.pull_request);
              templatePath = isPrComment ? ".github/codex/prompts/pull_request.md" : ".github/codex/prompts/issue.md";
              triggerMode = "mention:@oracle";
              const commentBody = (context.payload.comment?.body || "").trim() || "(empty)";
              const commentAuthor = context.payload.comment?.user?.login || "unknown";
              commentContext = `

            ## Invocation Comment
            - Author: ${commentAuthor}
            - Body:
            ${commentBody}
            `;
            } else {
              throw new Error(`Unsupported event: ${eventName}`);
            }

            const template = fs.readFileSync(templatePath, "utf8");
            const labels = (payload.labels || []).map((label) => label.name).join(", ") || "(none)";
            const body = (payload.body || "").trim() || "(empty)";
            const autoMode = (payload.labels || []).some((label) => label.name === "codex-auto");
            const autoBaseRef = isPr ? headRef : defaultBranch;
            const autoBranch = isPr
              ? `codex-auto/pr-${payload.number}-run-${process.env.GITHUB_RUN_ID}`
              : `codex-auto/issue-${payload.number}-run-${process.env.GITHUB_RUN_ID}`;
            const autoPrTitle = isPr
              ? `codex-auto: follow-up for #${payload.number} ${payload.title}`
              : `codex-auto: resolve #${payload.number} ${payload.title}`;

            const autoInstruction = autoMode
              ? `

            ## AUTO IMPLEMENTATION MODE
            - Implement the required code changes directly in this workspace.
            - Do not push or create branches manually; CI will create/update a PR automatically.
            - Run relevant validation commands (include \`poe check\` when applicable).
            - In final output include: files changed, risks, and validation results.
            `
              : (isPr ? `

            ## COMMENT MODE (CODE REVIEW)
            - Do not create git commits or branches.
            - Provide a formal Code Review based on the Diff provided.
            - RETURN YOUR ENTIRE OUTPUT AS STRICT VALID JSON. DO NOT WRAP WITH MARKDOWN CODE BLOCKS.
            - Format:
            {
              "review_action": "APPROVE", // or "REQUEST_CHANGES" or "COMMENT"
              "general_summary": "Overall feedback...",
              "inline_comments": [
                { "path": "src/file.js", "line": 42, "body": "Comment" }
              ]
            }
            - "line" in inline_comments MUST correspond to the lines added (+ lines) in the Diff.
            ` : `

            ## COMMENT MODE
            - Do not create git commits or branches.
            - Return analysis/review only.
            `);

            let diffContent = "";
            if (isPr && fs.existsSync(`${process.env.RUNNER_TEMP}/pr-diff.txt`)) {
              diffContent = fs.readFileSync(`${process.env.RUNNER_TEMP}/pr-diff.txt`, "utf8");
              if (diffContent.length > 30000) {
                diffContent = diffContent.slice(0, 30000) + "\n...[diff truncated due to size]";
              }
            }

            const prompt = `${template}

            ## GitHub Context
            - Event: ${context.eventName}
            - Repository: ${context.repo.owner}/${context.repo.repo}
            - Number: #${payload.number}
            - URL: ${payload.html_url}
            - Title: ${payload.title}
            - Labels: ${labels}
            - Trigger: ${triggerMode}

            ## Description
            ${body}
            ${commentContext}
            ${autoInstruction}
            ${diffContent ? `\n## Changes to Review (Diff)\n\`\`\`diff\n${diffContent}\n\`\`\`\n` : ""}
            `;
            const promptPath = `${process.env.RUNNER_TEMP}/codex-runtime-prompt.md`;
            fs.writeFileSync(promptPath, prompt);
            core.setOutput("target_number", String(payload.number));
            core.setOutput("trigger_mode", triggerMode);
            core.setOutput("prompt_path", promptPath);
            core.setOutput("auto_mode", String(autoMode));
            core.setOutput("auto_base_ref", autoBaseRef);
            core.setOutput("auto_branch", autoBranch);
            core.setOutput("auto_pr_title", autoPrTitle.slice(0, 250));
            core.setOutput("head_is_fork", String(headIsFork));

      - name: Comment start
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ steps.build_prompt.outputs.target_number }}");
            const triggerMode = "${{ steps.build_prompt.outputs.trigger_mode }}";
            const autoMode = "${{ steps.build_prompt.outputs.auto_mode }}" === "true";
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `### Codex Auto Run\n\nСтартовал запуск (${triggerMode}, mode=${autoMode ? "auto-pr" : "comment"}).\n\nRun: ${runUrl}`
            });

      - name: Run Codex
        shell: bash
        run: |
          cat "${{ steps.build_prompt.outputs.prompt_path }}" | codex exec -o "$RUNNER_TEMP/codex-final-message.md" -

      - name: Detect workspace changes
        id: detect_changes
        if: steps.build_prompt.outputs.auto_mode == 'true'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create auto pull request
        id: create_auto_pr
        if: >
          steps.build_prompt.outputs.auto_mode == 'true' &&
          steps.detect_changes.outputs.has_changes == 'true' &&
          (steps.resolve_refs.outputs.is_pr != 'true' || steps.build_prompt.outputs.head_is_fork != 'true')
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: ${{ steps.build_prompt.outputs.auto_pr_title }}
          title: ${{ steps.build_prompt.outputs.auto_pr_title }}
          branch: ${{ steps.build_prompt.outputs.auto_branch }}
          base: ${{ steps.build_prompt.outputs.auto_base_ref }}
          body: |
            Automated by Codex Auto.

            - Trigger: ${{ steps.build_prompt.outputs.trigger_mode }}
            - Target: #${{ steps.build_prompt.outputs.target_number }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            If this is a meta-PR, base is set to the target PR head branch.

      - name: Cleanup firewall allowlist for runner
        if: always()
        shell: bash
        run: |
          if [ -z "${RUNNER_EGRESS_IP:-}" ] || [ -z "${CODEX_LB_EFFECTIVE_BASE_URL:-}" ]; then
            echo "No firewall bootstrap context found, skipping cleanup"
            exit 0
          fi

          encoded_ip="$(python -c 'import os,urllib.parse; print(urllib.parse.quote(os.environ["RUNNER_EGRESS_IP"], safe=""))')"
          curl_auth_args=()
          if [ -n "${CODEX_DASHBOARD_COOKIE_FILE:-}" ] && [ -f "${CODEX_DASHBOARD_COOKIE_FILE}" ]; then
            curl_auth_args=(-b "${CODEX_DASHBOARD_COOKIE_FILE}")
          fi

          delete_status="$(curl -sS -o "$RUNNER_TEMP/firewall-del.json" -w "%{http_code}" \
            "${curl_auth_args[@]}" \
            -X DELETE \
            "${CODEX_LB_EFFECTIVE_BASE_URL}/api/firewall/ips/${encoded_ip}")"

          case "$delete_status" in
            200|404)
              echo "Firewall cleanup completed (HTTP $delete_status)"
              ;;
            *)
              echo "::warning::Firewall cleanup returned HTTP $delete_status"
              cat "$RUNNER_TEMP/firewall-del.json" || true
              ;;
          esac

      - name: Comment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const issueNumber = Number("${{ steps.build_prompt.outputs.target_number }}");
            const autoMode = "${{ steps.build_prompt.outputs.auto_mode }}" === "true";
            const hasChanges = "${{ steps.detect_changes.outputs.has_changes || 'false' }}" === "true";
            const prUrl = "${{ steps.create_auto_pr.outputs.pull-request-url }}";
            const isPr = "${{ steps.resolve_refs.outputs.is_pr }}" === "true";
            const headIsFork = "${{ steps.build_prompt.outputs.head_is_fork }}" === "true";
            let message = "";

            const finalPath = `${process.env.RUNNER_TEMP}/codex-final-message.md`;
            if (fs.existsSync(finalPath)) {
              message = fs.readFileSync(finalPath, "utf8").trim();
            }
            if (!message) {
              message = "Codex completed, but no final message was produced.";
            }

            let reviewFailed = false;

            if (!autoMode && isPr) {
              try {
                let jsonStr = message;
                if (jsonStr.startsWith("```json")) {
                  jsonStr = jsonStr.replace(/^```json\n/, "").replace(/\n```$/, "");
                } else if (jsonStr.startsWith("```")) {
                  jsonStr = jsonStr.replace(/^```\n/, "").replace(/\n```$/, "");
                }
                const parsed = JSON.parse(jsonStr);

                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: issueNumber,
                  commit_id: "${{ steps.resolve_refs.outputs.head_sha }}",
                  event: parsed.review_action || "COMMENT",
                  body: parsed.general_summary || "Automated Review by Codex",
                  comments: parsed.inline_comments || []
                });
                return;
              } catch (err) {
                console.log("Failed to create inline review:", err);
                message = "Codex attempted a review but it could not be applied (invalid JSON or mismatching lines). Raw output:\n\n```\n" + message + "\n```";
                reviewFailed = true;
              }
            }

            const maxLength = 60000;
            if (message.length > maxLength) {
              message = `${message.slice(0, maxLength)}\n\n[truncated]`;
            }

            let autoSummary = "";
            if (autoMode) {
              if (prUrl) {
                autoSummary = `\n\nAuto PR: ${prUrl}`;
              } else if (!hasChanges) {
                autoSummary = `\n\nAuto PR: changes not detected.`;
              } else if (isPr && headIsFork) {
                autoSummary = `\n\nAuto PR: skipped because target PR head branch is in a fork repository.`;
              } else {
                autoSummary = `\n\nAuto PR: attempted, but no PR URL was returned.`;
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: reviewFailed ? message : `### Codex Auto Run\n\n${message}${autoSummary}`
            });
