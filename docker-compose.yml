services:
  postgres:
    image: postgres:17
    container_name: mospoli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mospoli_db
      POSTGRES_USER: mospoli_user
      POSTGRES_PASSWORD: mospoli_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8.4
    container_name: mospoli-redis
    restart: unless-stopped
    command: ["redis-server", "--loglevel", "notice"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - logs_data:/data/logs
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: mospoli-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  infinity:
    build:
      context: .
      dockerfile: docker/Dockerfile.semantic_runtime
    container_name: mospoli-infinity
    restart: unless-stopped
    environment:
      PYTHONIOENCODING: utf-8
    ports:
      - "7997:7997"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: mospoli-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      infinity:
        condition: service_started
      semantic_indexer:
        condition: service_completed_successfully
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://mospoli_user:mospoli_password@postgres:5432/mospoli_db
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: routes
      INFINITY_BASE_URL: http://infinity:7997
      INFINITY_EMBEDDING_MODEL: mospoli-hash-embeddings-v1
      INFINITY_RERANKER_MODEL: ""
      SEMANTIC_ROUTER_SCORE_THRESHOLD: "0.30"
      SEMANTIC_ROUTER_TOP_K: "8"
      SEMANTIC_ROUTER_RERANK_TOP_K: "0"
      PORT: 5000
      WEB_CONCURRENCY: 1
      GUNICORN_THREADS: 4
      SECRET_KEY: change_this_secret_key
      LOG_DIR: /shared-logs
      LOG_FILE: app.log
      GUNICORN_CMD_ARGS: --access-logfile /shared-logs/gunicorn-access.log --error-logfile /shared-logs/gunicorn-error.log
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/shared-logs

  semantic_indexer:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: mospoli-semantic-indexer
    restart: "no"
    depends_on:
      qdrant:
        condition: service_started
      infinity:
        condition: service_started
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: routes
      INFINITY_BASE_URL: http://infinity:7997
      INFINITY_EMBEDDING_MODEL: mospoli-hash-embeddings-v1
      INFINITY_RERANKER_MODEL: ""
      SEMANTIC_ROUTER_SCORE_THRESHOLD: "0.30"
      SEMANTIC_ROUTER_TOP_K: "8"
      SEMANTIC_ROUTER_RERANK_TOP_K: "0"
    command: >
      sh -c "python scripts/wait_for_semantic_services.py --timeout 1800
      && python -m semantic_router.cli index"

  dramatiq_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: mospoli-dramatiq-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://mospoli_user:mospoli_password@postgres:5432/mospoli_db
      DRAMATIQ_PROCESSES: 1
      DRAMATIQ_THREADS: 2
      LOG_DIR: /shared-logs
      LOG_FILE: worker.log
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/shared-logs

  file_storage:
    build:
      context: .
      dockerfile: docker/file_storage/Dockerfile
    container_name: mospoli-file-storage
    restart: unless-stopped
    environment:
      FILE_STORAGE_USER: storage_admin
      FILE_STORAGE_PASSWORD: change_this_password
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - uploads_data:/srv/uploads:ro
      - logs_data:/shared-logs

volumes:
  redis_data:
  postgres_data:
  uploads_data:
  logs_data:
  qdrant_data:
